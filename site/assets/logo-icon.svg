<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130" width="120" height="130">
  <defs>
    <linearGradient id="faceTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="faceLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="faceRight" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
  </defs>
  <!-- Isometric cube -->
  <!-- Top face -->
  <polygon points="60,10 110,38 60,66 10,38" fill="url(#faceTop)" stroke="#0c4a6e" stroke-width="2"/>
  <!-- Left face -->
  <polygon points="10,38 60,66 60,120 10,92" fill="url(#faceLeft)" stroke="#0c4a6e" stroke-width="2"/>
  <!-- Right face -->
  <polygon points="110,38 60,66 60,120 110,92" fill="url(#faceRight)" stroke="#0c4a6e" stroke-width="2"/>
  <!-- Australia outline on left face (simplified) -->
  <g transform="translate(18,52) scale(0.38)" fill="none" stroke="#0c4a6e" stroke-width="2.5" stroke-linejoin="round">
    <path d="M20,45 C22,38 30,30 42,28 C50,26 58,30 65,28 C72,26 80,20 90,22 C98,24 105,30 108,38 C110,44 108,52 105,58 C102,64 95,70 88,72 C82,74 75,70 70,72 C65,74 60,80 52,82 C44,84 35,80 28,74 C22,68 18,58 20,45Z"/>
    <!-- Tasmania -->
    <ellipse cx="85" cy="85" rx="8" ry="6" transform="rotate(-15,85,85)"/>
  </g>
  <!-- NZ outline on right face (simplified) -->
  <g transform="translate(68,50) scale(0.35)" fill="none" stroke="#0c4a6e" stroke-width="2.5" stroke-linejoin="round">
    <!-- North Island -->
    <path d="M55,30 C60,25 70,22 75,28 C80,34 78,42 72,48 C66,54 58,52 55,46 C52,40 52,35 55,30Z"/>
    <!-- South Island -->
    <path d="M45,52 C50,48 58,50 62,56 C66,62 65,72 60,78 C55,84 48,85 42,80 C36,74 38,62 45,52Z"/>
  </g>
  <!-- ANZIAM text on top face -->
  <text x="60" y="44" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="13" font-weight="900" fill="#0c4a6e" transform="rotate(-2,60,44)">ANZIAM</text>
</svg>
